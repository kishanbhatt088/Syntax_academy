<!-- templates/accounts/login.html -->

{% extends 'base.html' %}

{% block title %}Login - Syntax Academy{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <!-- Logo/Header -->
                    <div class="text-center mb-4">
                        <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
                        <h3 class="fw-bold">Welcome Back!</h3>
                        <p class="text-muted">Sign in to your account</p>

                    </div>

                    <!-- Messages -->
                    {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                    {% endif %}

                    <!-- Login Form -->
                    <form method="POST" action="{% url 'accounts:login' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="username" class="form-label fw-medium">
                                <i class="fas fa-user me-1"></i>Username or Email
                            </label>
                            <input type="text" name="username" id="username" class="form-control form-control-lg"
                                placeholder="Enter username or email" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">
                                <i class="fas fa-lock me-1"></i>Password
                            </label>
                            <div class="input-group">
                                <input type="password" name="password" id="password"
                                    class="form-control form-control-lg" placeholder="Enter password" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" name="remember_me" class="form-check-input" id="remember_me">
                            <label class="form-check-label" for="remember_me">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>

                    <hr class="my-4">

                    <!-- Register Link -->
                    <div class="text-center">
                        <p class="mb-0">
                            Don't have an account?
                            <a href="{% url 'accounts:register' %}" class="text-primary fw-bold">
                                Register here
                            </a>
                        </p>
                    </div>

                    <!-- Role Info -->
                    <div class="mt-4 p-3 bg-light rounded">
                        <h6 class="fw-bold mb-2">

                        </h6>
                        <ul class="list-unstyled mb-0 small text-muted">
                            <li class="mb-1">

                            </li>

                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle Password Visibility
    document.getElementById('togglePassword').addEventListener('click', function () {
        const password = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        if (password.type === 'password') {
            password.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            password.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    });
</script>
{% endblock %}
