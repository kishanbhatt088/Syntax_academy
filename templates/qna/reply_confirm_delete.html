{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center"><div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white"><h4 class="mb-0">Delete Reply</h4></div>
            <div class="card-body">
                <p>Are you sure you want to delete this reply?</p>
                <div class="p-3 bg-light rounded mb-3">{{ reply.content|truncatewords:30 }}</div>
                <form method="POST">{% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'qna:question_detail' reply.question.pk %}" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div></div>
</div>
{% endblock %}
