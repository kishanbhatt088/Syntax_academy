{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'qna:question_list' %}">Q&A Forum</a></li>
                    <li class="breadcrumb-item active">{{ title }}</li>
                </ol>
            </nav>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h3 class="fw-bold mb-0"><i class="fas fa-question-circle text-primary me-2"></i>{{ title }}</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Course *</label>
                            <select name="course" class="form-select" required>
                                <option value="">Select a course</option>
                                {% for course in courses %}
                                <option value="{{ course.id }}" {% if question.course_id == course.id %}selected{% endif %}>
                                    {{ course.title }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Question Title *</label>
                            <input type="text" name="title" class="form-control" placeholder="What is your question?" value="{{ question.title|default:'' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Details *</label>
                            <textarea name="content" class="form-control" rows="6" placeholder="Describe your question in detail..." required>{{ question.content|default:'' }}</textarea>
                        </div>
                        
                        <div class="mb-4 form-check">
                            <input type="checkbox" name="is_public" class="form-check-input" id="is_public" {% if question.is_public %}checked{% elif not question %}checked{% endif %}>
                            <label class="form-check-label" for="is_public">Make this question visible to other students</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>{{ action }}
                        </button>
                        <a href="{% url 'qna:question_list' %}" class="btn btn-secondary btn-lg ms-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
